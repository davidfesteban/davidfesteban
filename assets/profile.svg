<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 300" role="img" aria-labelledby="title desc">
  <title id="title">David Fernández Esteban profile banner</title>
  <desc id="desc">Animated terminal-style profile banner for David Fernández Esteban.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#111827"/>
      <stop offset="58%" stop-color="#182338"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="line" x1="0" x2="1">
      <stop offset="0%" stop-color="#22c55e"/>
      <stop offset="48%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <style>
      .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace; }
      .sans { font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .text { fill: #f8fafc; }
      .dim { fill: #94a3b8; }
      .green { fill: #86efac; }
      .blue { fill: #7dd3fc; }
      .amber { fill: #fcd34d; }
      .scan { animation: scan 6s ease-in-out infinite; }
      .blink { animation: blink 1.05s steps(2, start) infinite; }
      .pulse { animation: pulse 3.4s ease-in-out infinite; }
      .type-a { animation: typeA 8s steps(35, end) infinite; }
      .type-b { animation: typeB 8s steps(34, end) infinite; }
      @keyframes scan {
        0%, 100% { transform: translateX(-260px); opacity: .06; }
        50% { transform: translateX(1120px); opacity: .16; }
      }
      @keyframes blink {
        50% { opacity: 0; }
      }
      @keyframes pulse {
        0%, 100% { opacity: .35; transform: scale(1); }
        50% { opacity: .85; transform: scale(1.06); }
      }
      @keyframes typeA {
        0% { clip-path: inset(0 100% 0 0); }
        18%, 48% { clip-path: inset(0 0 0 0); }
        60%, 100% { clip-path: inset(0 100% 0 0); }
      }
      @keyframes typeB {
        0%, 50% { clip-path: inset(0 100% 0 0); }
        70%, 94% { clip-path: inset(0 0 0 0); }
        100% { clip-path: inset(0 100% 0 0); }
      }
      @media (prefers-reduced-motion: reduce) {
        .scan, .blink, .pulse, .type-a, .type-b { animation: none; }
        .type-a, .type-b { clip-path: none; }
      }
    </style>
  </defs>

  <rect width="1200" height="300" rx="24" fill="url(#bg)"/>
  <path d="M0 236 C 145 205, 246 268, 390 227 C 552 181, 661 222, 810 206 C 977 188, 1066 229, 1200 184 L 1200 300 L 0 300 Z" fill="#020617" opacity=".38"/>
  <rect class="scan" x="-120" y="0" width="180" height="300" fill="#ffffff"/>

  <g opacity=".2" stroke="#38bdf8" stroke-width="1.2">
    <path d="M76 70 H224 V112 H352"/>
    <path d="M826 70 H984 V112 H1126"/>
    <path d="M805 235 H944 V197 H1088"/>
    <circle class="pulse" cx="76" cy="70" r="4" fill="#38bdf8"/>
    <circle class="pulse" cx="352" cy="112" r="4" fill="#38bdf8"/>
    <circle class="pulse" cx="1126" cy="112" r="4" fill="#38bdf8"/>
    <circle class="pulse" cx="805" cy="235" r="4" fill="#38bdf8"/>
  </g>

  <g filter="url(#glow)">
    <circle cx="1000" cy="221" r="42" fill="#22c55e" opacity=".18"/>
    <circle cx="1051" cy="196" r="20" fill="#38bdf8" opacity=".2"/>
    <circle cx="174" cy="220" r="34" fill="#f59e0b" opacity=".13"/>
  </g>

  <g transform="translate(88 52)">
    <rect width="760" height="196" rx="16" fill="#020617" opacity=".86" stroke="#334155"/>
    <rect x="1" y="1" width="758" height="38" rx="15" fill="#111827"/>
    <circle cx="25" cy="20" r="6" fill="#ef4444"/>
    <circle cx="47" cy="20" r="6" fill="#f59e0b"/>
    <circle cx="69" cy="20" r="6" fill="#22c55e"/>
    <text x="96" y="25" class="mono dim" font-size="15">~/davidfesteban</text>

    <text x="28" y="80" class="mono green" font-size="21">$ whoami</text>
    <text x="28" y="119" class="sans text" font-size="39" font-weight="750">David Fernández Esteban</text>
    <text x="28" y="154" class="mono dim" font-size="20">small, stubborn tools for local-first work</text>
    <g transform="translate(28 180)">
      <text class="mono blue type-a" font-size="18">AI coding workflows without platform sprawl</text>
      <text class="mono amber type-b" font-size="18">automation that survives real machines</text>
      <rect class="blink" x="425" y="-15" width="10" height="21" fill="#e5e7eb"/>
    </g>
  </g>

  <g transform="translate(902 82)">
    <text class="mono dim" font-size="15">SHELVES</text>
    <text x="0" y="44" class="mono green" font-size="18">GitArchive</text>
    <text x="0" y="76" class="mono blue" font-size="18">GitRegistry</text>
    <text x="0" y="108" class="mono amber" font-size="18">GitRegret</text>
    <rect x="0" y="136" width="190" height="2" fill="url(#line)"/>
    <text x="0" y="174" class="mono dim" font-size="14">fewer platforms, better defaults</text>
  </g>
</svg>
