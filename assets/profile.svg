<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 360" role="img" aria-labelledby="title desc">
  <title id="title">David Festeban profile banner</title>
  <desc id="desc">Animated terminal-style banner for David Festeban, focused on local-first apps, AI coding workflows, automation, and backend systems.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#111827"/>
      <stop offset="46%" stop-color="#1f2937"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" x2="1">
      <stop offset="0%" stop-color="#22c55e"/>
      <stop offset="50%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
    <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="7" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <style>
      .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace; }
      .sans { font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .dim { fill: #94a3b8; }
      .text { fill: #e5e7eb; }
      .green { fill: #86efac; }
      .blue { fill: #7dd3fc; }
      .amber { fill: #fcd34d; }
      .scan {
        animation: scan 6s ease-in-out infinite;
      }
      .blink {
        animation: blink 1.05s steps(2, start) infinite;
      }
      .float-a {
        animation: floatA 8s ease-in-out infinite;
      }
      .float-b {
        animation: floatB 10s ease-in-out infinite;
      }
      .type-1 {
        animation: typeOne 8s steps(26, end) infinite;
      }
      .type-2 {
        animation: typeTwo 8s steps(31, end) infinite;
      }
      @keyframes blink {
        50% { opacity: 0; }
      }
      @keyframes scan {
        0%, 100% { transform: translateX(-280px); opacity: .08; }
        50% { transform: translateX(1080px); opacity: .2; }
      }
      @keyframes floatA {
        0%, 100% { transform: translate(0, 0); opacity: .55; }
        50% { transform: translate(18px, -12px); opacity: .9; }
      }
      @keyframes floatB {
        0%, 100% { transform: translate(0, 0); opacity: .5; }
        50% { transform: translate(-16px, 14px); opacity: .8; }
      }
      @keyframes typeOne {
        0% { clip-path: inset(0 100% 0 0); }
        18%, 48% { clip-path: inset(0 0 0 0); }
        60%, 100% { clip-path: inset(0 100% 0 0); }
      }
      @keyframes typeTwo {
        0%, 50% { clip-path: inset(0 100% 0 0); }
        70%, 94% { clip-path: inset(0 0 0 0); }
        100% { clip-path: inset(0 100% 0 0); }
      }
      @media (prefers-reduced-motion: reduce) {
        .scan, .blink, .float-a, .float-b, .type-1, .type-2 {
          animation: none;
        }
        .type-1, .type-2 {
          clip-path: none;
        }
      }
    </style>
  </defs>

  <rect width="1200" height="360" rx="26" fill="url(#bg)"/>
  <path d="M0 286 C 148 230, 282 324, 430 271 S 733 197, 895 253 S 1091 326, 1200 258 L 1200 360 L 0 360 Z" fill="#020617" opacity=".38"/>
  <rect class="scan" x="-120" y="0" width="180" height="360" fill="#ffffff" opacity=".12"/>

  <g opacity=".18" stroke="#38bdf8" stroke-width="1">
    <path d="M70 80 H245 V132 H376"/>
    <path d="M910 76 H1018 V122 H1132"/>
    <path d="M824 270 H930 V226 H1106"/>
    <circle cx="70" cy="80" r="4" fill="#38bdf8"/>
    <circle cx="376" cy="132" r="4" fill="#38bdf8"/>
    <circle cx="910" cy="76" r="4" fill="#38bdf8"/>
    <circle cx="1132" cy="122" r="4" fill="#38bdf8"/>
    <circle cx="824" cy="270" r="4" fill="#38bdf8"/>
    <circle cx="1106" cy="226" r="4" fill="#38bdf8"/>
  </g>

  <g class="float-a" filter="url(#softGlow)">
    <circle cx="1015" cy="252" r="54" fill="#22c55e" opacity=".18"/>
    <circle cx="1067" cy="210" r="22" fill="#38bdf8" opacity=".2"/>
  </g>
  <g class="float-b" filter="url(#softGlow)">
    <circle cx="166" cy="236" r="42" fill="#f59e0b" opacity=".16"/>
    <circle cx="209" cy="208" r="18" fill="#22c55e" opacity=".18"/>
  </g>

  <g transform="translate(88 62)">
    <rect width="720" height="236" rx="16" fill="#020617" opacity=".84" stroke="#334155"/>
    <rect x="1" y="1" width="718" height="38" rx="15" fill="#111827"/>
    <circle cx="25" cy="20" r="6" fill="#ef4444"/>
    <circle cx="47" cy="20" r="6" fill="#f59e0b"/>
    <circle cx="69" cy="20" r="6" fill="#22c55e"/>
    <text x="96" y="25" class="mono dim" font-size="15">~/davidfesteban</text>

    <text x="28" y="78" class="mono green" font-size="21">$ whoami</text>
    <text x="28" y="114" class="sans text" font-size="43" font-weight="750">David Festeban</text>
    <text x="28" y="150" class="mono dim" font-size="21">small, stubborn tools for local-first work</text>

    <g transform="translate(28 186)">
      <text class="mono blue type-1" font-size="20">ai workflows without platform sprawl</text>
      <text class="mono amber type-2" font-size="20">automation that survives real machines</text>
      <rect class="blink" x="420" y="-17" width="12" height="23" fill="#e5e7eb"/>
    </g>
  </g>

  <g transform="translate(866 84)">
    <text class="mono dim" font-size="16">CURRENT FOCUS</text>
    <g class="mono" font-size="18">
      <text x="0" y="44" class="green">01</text>
      <text x="42" y="44" class="text">local AI</text>
      <text x="0" y="82" class="blue">02</text>
      <text x="42" y="82" class="text">Obsidian systems</text>
      <text x="0" y="120" class="amber">03</text>
      <text x="42" y="120" class="text">GitHub-native apps</text>
      <text x="0" y="158" class="green">04</text>
      <text x="42" y="158" class="text">Docker + servers</text>
    </g>
    <rect x="0" y="190" width="214" height="2" fill="url(#accent)" opacity=".9"/>
    <text x="0" y="228" class="mono dim" font-size="15">no backend until proven guilty</text>
  </g>
</svg>
