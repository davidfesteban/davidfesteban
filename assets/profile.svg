<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 260" role="img" aria-labelledby="title desc">
  <title id="title">Profile banner</title>
  <desc id="desc">Minimal terminal-style profile banner with project shelves.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#111827"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="rule" x1="0" x2="1">
      <stop offset="0%" stop-color="#22c55e"/>
      <stop offset="55%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
    <style>
      .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace; }
      .sans { font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .text { fill: #f8fafc; }
      .muted { fill: #94a3b8; }
      .green { fill: #86efac; }
      .blue { fill: #7dd3fc; }
      .amber { fill: #fcd34d; }
      .blink { animation: blink 1.05s steps(2, start) infinite; }
      @keyframes blink { 50% { opacity: 0; } }
      @media (prefers-reduced-motion: reduce) {
        .blink { animation: none; }
      }
    </style>
  </defs>

  <rect width="1200" height="260" rx="22" fill="url(#bg)"/>
  <path d="M0 206 C 185 174, 318 226, 505 188 C 675 154, 815 189, 980 170 C 1084 158, 1146 172, 1200 145 L 1200 260 L 0 260 Z" fill="#020617" opacity=".42"/>

  <g opacity=".16" stroke="#38bdf8" stroke-width="1">
    <path d="M78 66 H244 V105 H370"/>
    <path d="M854 58 H990 V100 H1120"/>
    <circle cx="78" cy="66" r="4" fill="#38bdf8"/>
    <circle cx="370" cy="105" r="4" fill="#38bdf8"/>
    <circle cx="1120" cy="100" r="4" fill="#38bdf8"/>
  </g>

  <g transform="translate(88 45)">
    <rect width="760" height="170" rx="14" fill="#020617" opacity=".9" stroke="#334155"/>
    <rect x="1" y="1" width="758" height="36" rx="13" fill="#111827"/>
    <circle cx="24" cy="19" r="6" fill="#ef4444"/>
    <circle cx="46" cy="19" r="6" fill="#f59e0b"/>
    <circle cx="68" cy="19" r="6" fill="#22c55e"/>
    <text x="94" y="24" class="mono muted" font-size="15">~/probably-not-production</text>

    <text x="28" y="76" class="mono green" font-size="20">$ pwd</text>
    <text x="28" y="112" class="sans text" font-size="31" font-weight="750">Somewhere between compose up and why.</text>
    <text x="28" y="145" class="mono muted" font-size="19">No plan survives first contact with the logs.</text>
    <rect class="blink" x="584" y="130" width="10" height="22" fill="#e5e7eb"/>
  </g>

  <g transform="translate(902 70)">
    <text class="mono muted" font-size="15">SHELVES</text>
    <text x="0" y="42" class="mono green" font-size="18">GitArchive</text>
    <text x="0" y="74" class="mono blue" font-size="18">GitRegistry</text>
    <text x="0" y="106" class="mono amber" font-size="18">GitRegret</text>
    <rect x="0" y="132" width="190" height="2" fill="url(#rule)"/>
    <text x="0" y="164" class="mono muted" font-size="14">ship, shelve, explain later</text>
  </g>
</svg>
