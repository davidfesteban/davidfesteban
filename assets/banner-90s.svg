<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 260" role="img" aria-labelledby="title desc">
  <title id="title">90s blue gray banner</title>
  <desc id="desc">Blue-gray 90s desktop-style GitHub profile banner.</desc>
  <defs>
    <style>
      .sys { font-family: "MS Sans Serif", Tahoma, Verdana, Arial, sans-serif; }
      .mono { font-family: "Courier New", ui-monospace, monospace; }
    </style>
  </defs>
  <rect width="1200" height="260" rx="0" fill="#5f7184"/>
  <rect x="26" y="24" width="1148" height="212" fill="#9aa9b8" stroke="#d8e1ea" stroke-width="4"/>
  <rect x="36" y="34" width="1128" height="30" fill="#1d4f91"/>
  <text x="50" y="55" class="sys" font-size="16" fill="#ffffff">NOWHERE.EXE</text>
  <rect x="1130" y="41" width="18" height="16" fill="#c7d0d9" stroke="#ffffff"/>
  <text x="1135" y="54" class="sys" font-size="14" fill="#111827">x</text>
  <rect x="64" y="90" width="642" height="92" fill="#d7dee7" stroke="#475569" stroke-width="2"/>
  <rect x="78" y="104" width="44" height="44" fill="#1d4f91"/>
  <text x="88" y="135" class="sys" font-size="30" fill="#ffffff">?</text>
  <text x="142" y="124" class="sys" font-size="24" fill="#111827">Lost in the middle of nowhere.</text>
  <text x="142" y="155" class="sys" font-size="20" fill="#334155">If you are reading this, then we are two.</text>
  <rect x="760" y="90" width="356" height="92" fill="#0f172a" stroke="#d7dee7" stroke-width="2"/>
  <text x="784" y="124" class="mono" font-size="20" fill="#86efac">$ sudo lost</text>
  <text x="784" y="155" class="mono" font-size="17" fill="#fca5a5">AI: drop database? [Y/n]</text>
  <rect x="884" y="196" width="142" height="28" fill="#c7d0d9" stroke="#475569"/>
  <text x="925" y="216" class="sys" font-size="16" fill="#111827">Cancel</text>
</svg>
